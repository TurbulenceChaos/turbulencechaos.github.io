  <h1>Tips</h1>
  <h2>Wolfram Mathematica</h2>

  <p>At the beginning of the code:</p>

  <pre><code>If[Length[Names["`*"]] > 0, Remove["`*"]];
SetDirectory[NotebookDirectory[]];</code></pre>

  <p>Plot export:</p>
  <pre><code>ImageResolution -> 600, RasterSize -> Round[8/2.54*600]</code></pre>

  <h2>Microsoft Word</h2>
  <p>Type <em>Alt+F9</em> when citation references display error.</p>
