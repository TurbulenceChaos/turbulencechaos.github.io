  <pre lang="Mathematica"><code>If[Length[Names["`*"]] > 0, Remove["`*"]];
SetDirectory[NotebookDirectory[]];</code></pre>

  <pre lang="Mathematica"><code>ImageResolution -> 600, RasterSize -> Round[8/2.54*600]</code></pre>
